<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Memo POP</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { 
            --main-blue: #00a8ff; 
            --accent-orange: #ff9f43; 
            --success-green: #2ecc71; 
            --danger-red: #ff4757;
            --bg-light: #f1f2f6;
        }
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: var(--bg-light); 
            margin: 0; 
            padding: env(safe-area-inset-top) 8px 20px; 
            font-size: 14px; 
            color: #2f3542;
        }
        .container { 
            max-width: 480px; 
            margin: 0 auto; 
            background: #ffffff; 
            min-height: 100vh; 
            padding: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border-radius: 15px;
            position: relative; 
            padding-bottom: 60px; 
        }
        
        button { cursor: pointer; border: none; border-radius: 10px; font-weight: 900; transition: 0.2s; }
        
        #installBanner { 
            display: none; background: #2f3542; color: white; padding: 10px; 
            margin-bottom: 10px; border-radius: 12px; justify-content: space-between; 
            align-items: center; border-left: 5px solid var(--main-blue);
        }
        .install-btn { background: var(--main-blue); color: white; padding: 6px 15px; font-size: 0.8rem; }

        .add-btn { 
            background: linear-gradient(135deg, var(--main-blue), #0097e6); 
            color: white; width: 100%; padding: 12px; font-size: 1.1rem; 
            margin-bottom: 12px; box-shadow: 0 4px 0 #0086cc; 
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
        }
        .add-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #0086cc; }

        /* メモカード (POPスタイル) */
        .day-card { 
            border: 2px solid #e1e8ed; margin-bottom: 6px; border-radius: 12px; 
            background: white; overflow: hidden; box-shadow: 0 3px 6px rgba(0,0,0,0.05); 
        }
        .day-header { 
            background: #f8f9fa; padding: 6px 12px; display: flex; 
            justify-content: space-between; align-items: center; cursor: pointer; 
        }
        .day-title { font-size: 1rem; font-weight: 900; color: var(--main-blue); }
        .day-content { padding: 0; display: none; border-top: 2px solid #f1f2f6; }
        .day-content.active { display: block; }

        /* テーブル (超スリム & 見やすい) */
        .item-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .item-row { border-bottom: 1px solid #f1f2f6; }
        .item-name { 
            width: 40%; padding: 6px 10px; font-size: 0.85rem; font-weight: bold; 
            color: #57606f; background: #f9f9f9; border-right: 1px solid #f1f2f6;
        }
        .item-input-cell { width: 60%; padding: 3px 6px; }
        .item-input { 
            width: 100%; padding: 8px; border: 2px solid #ced4da; border-radius: 8px; 
            font-size: 1.1rem; font-weight: bold; outline: none; box-sizing: border-box; 
            transition: 0.3s; color: #2f3542;
        }
        .item-input:focus { border-color: var(--accent-orange); background: #fffaf0; }

        .card-footer { display: flex; justify-content: flex-end; padding: 5px 10px; background: #fff; gap: 8px; }
        .btn-small { font-size: 0.75rem; padding: 4px 10px; color: white; border-radius: 6px; }

        /* マスター設定 (アコーディオン) */
        .master-settings { border: 2px dashed var(--main-blue); border-radius: 12px; margin-top: 20px; overflow: hidden; }
        .master-header { 
            background: #eef9ff; padding: 10px 12px; display: flex; 
            justify-content: space-between; align-items: center; cursor: pointer; 
            font-weight: 900; color: var(--main-blue); font-size: 0.9rem; 
        }
        .master-content { display: none; padding: 10px; background: #fff; }
        .master-content.active { display: block; }
        
        .master-row { 
            display: flex; align-items: center; background: #f1f2f6; 
            border-radius: 8px; margin-bottom: 4px; padding: 5px; 
        }
        .master-name-text { flex-grow: 1; font-weight: bold; padding-left: 8px; color: #2f3542; }
        .btn-order { background: white; color: var(--main-blue); padding: 4px 8px; font-size: 0.8rem; border: 1px solid var(--main-blue); }
        
        .app-footer { 
            margin-top: 30px; text-align: center; color: #a4b0be; 
            font-size: 0.75rem; font-weight: bold; padding: 10px;
        }

        /* モーダル */
        #modalOverlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(47, 53, 66, 0.8); z-index: 100; justify-content: center; 
            align-items: flex-start; padding-top: 50px; 
        }
        .modal { 
            background: white; width: 90%; max-width: 350px; padding: 20px; 
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        @keyframes bounceIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal input { 
            width: 100%; padding: 12px; border: 3px solid var(--main-blue); 
            border-radius: 12px; font-size: 1.2rem; box-sizing: border-box; 
            margin: 15px 0; outline: none; 
        }
    </style>
</head>
<body>

<div class="container">
    <div id="installBanner">
        <span>✨ ホーム画面に追加して便利に！</span>
        <button class="install-btn" id="installBtn">追加</button>
    </div>

    <button class="add-btn" onclick="addNewDay()">🚀 新規メモを爆速追加</button>
    
    <div id="memoList"></div>

    <div class="master-settings">
        <div class="master-header" onclick="toggleMaster()">
            <span>🛠 項目マスター設定 (カスタマイズ)</span>
            <span id="masterArrow">▼</span>
        </div>
        <div id="masterContent" class="master-content">
            <div id="masterItemList" style="margin-bottom:10px;"></div>
            <div id="masterConfirmArea"></div>
            <button onclick="openModal()" style="background:var(--success-green); color:white; width:100%; padding:10px; font-size:0.9rem; box-shadow: 0 3px 0 #27ae60;">＋ 新しい項目を増やす</button>
        </div>
    </div>

    <div class="app-footer">
        <div>🎨 制作者：1F加工西</div>
        <div>Version 2.0 (Bright POP)</div>
    </div>
</div>

<div id="modalOverlay">
    <div class="modal">
        <h3 style="margin:0; color:var(--main-blue); text-align:center;">新しい項目を追加！</h3>
        <input type="text" id="newMasterItemName" placeholder="項目名を入力...">
        <div style="display:flex; justify-content:center; gap:15px;">
            <button class="btn-small" style="background:var(--gray); padding:8px 20px;" onclick="closeModal()">やめる</button>
            <button class="btn-small" style="background:var(--main-blue); padding:8px 25px; font-size:0.9rem;" onclick="executeAddMaster()">追加！</button>
        </div>
    </div>
</div>

<script>
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        if (!window.matchMedia('(display-mode: standalone)').matches) document.getElementById('installBanner').style.display = 'flex';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') document.getElementById('installBanner').style.display = 'none';
        deferredPrompt = null;
    });

    let store = JSON.parse(localStorage.getItem('daily_memo_v8')) || {
        master_items: ["生産数", "ロス数", "清掃点検"],
        logs: []
    };

    function save() { localStorage.setItem('daily_memo_v8', JSON.stringify(store)); render(); }
    function getTargetDate() {
        const now = new Date();
        if (now.getHours() >= 18) now.setDate(now.getDate() + 1);
        return `${now.getMonth() + 1}/${now.getDate()}`;
    }

    function addNewDay() {
        const dateStr = getTargetDate();
        const newEntry = { id: Date.now(), date: dateStr, items: store.master_items.map(name => ({ name: name, value: "" })) };
        store.logs.unshift(newEntry);
        if (store.logs.length > 30) store.logs.pop();
        save();
    }

    function updateVal(dayId, itemIdx, val) {
        const log = store.logs.find(l => l.id === dayId);
        if (log) { log.items[itemIdx].value = val; localStorage.setItem('daily_memo_v8', JSON.stringify(store)); }
    }

    function toggleMaster() {
        const content = document.getElementById('masterContent');
        const arrow = document.getElementById('masterArrow');
        const isActive = content.classList.toggle('active');
        arrow.innerText = isActive ? '▲' : '▼';
    }

    function openModal() {
        document.getElementById('modalOverlay').style.display = 'flex';
        const input = document.getElementById('newMasterItemName');
        input.focus();
        input.onkeydown = (e) => { if (e.key === 'Enter') executeAddMaster(); };
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; document.getElementById('newMasterItemName').value = ''; }
    function executeAddMaster() {
        const name = document.getElementById('newMasterItemName').value.trim();
        if (name) { store.master_items.push(name); save(); closeModal(); }
    }

    function showDelConfirm(dayId) {
        document.getElementById(`btn-del-pre-${dayId}`).style.display = 'none';
        document.getElementById(`confirm-ui-${dayId}`).style.display = 'flex';
    }
    function hideDelConfirm(dayId) {
        document.getElementById(`btn-del-pre-${dayId}`).style.display = 'inline-block';
        document.getElementById(`confirm-ui-${dayId}`).style.display = 'none';
    }
    function deleteDay(dayId) { store.logs = store.logs.filter(l => l.id !== dayId); save(); }
    function moveItem(idx, direction) {
        const newIdx = idx + direction;
        if (newIdx < 0 || newIdx >= store.master_items.length) return;
        const temp = store.master_items[idx]; store.master_items[idx] = store.master_items[newIdx]; store.master_items[newIdx] = temp; save();
    }
    function showMasterDelConfirm(idx) {
        const name = store.master_items[idx];
        document.getElementById('masterConfirmArea').innerHTML = `
            <div style="background:#fff1f0; border:2px solid #ffa39e; padding:8px; border-radius:12px; margin-top:4px; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:bold; color:var(--danger-red);">「${name}」消す？</span>
                <div>
                    <button class="btn-small" style="background:var(--danger-red); box-shadow: 0 2px 0 #c0392b;" onclick="executeMasterDelete(${idx})">消す</button>
                    <button class="btn-small" style="background:#ccc;" onclick="document.getElementById('masterConfirmArea').innerHTML=''">中止</button>
                </div>
            </div>
        `;
    }
    function executeMasterDelete(idx) { store.master_items.splice(idx, 1); document.getElementById('masterConfirmArea').innerHTML = ''; save(); }

    function render() {
        const mList = document.getElementById('masterItemList');
        mList.innerHTML = store.master_items.map((it, i) => `
            <div class="master-row">
                <div class="order-btns">
                    <button class="btn-order" onclick="moveItem(${i}, -1)" ${i === 0 ? 'disabled style="opacity:0.1"' : ''}>↑</button>
                    <button class="btn-order" onclick="moveItem(${i}, 1)" ${i === store.master_items.length - 1 ? 'disabled style="opacity:0.1"' : ''}>↓</button>
                </div>
                <div class="master-name-text">${it}</div>
                <span style="color:var(--danger-red); cursor:pointer; font-weight:900; padding:4px 12px; font-size:1.2rem;" onclick="showMasterDelConfirm(${i})">×</span>
            </div>
        `).join('');

        const list = document.getElementById('memoList');
        list.innerHTML = '';
        store.logs.forEach((log, idx) => {
            const card = document.createElement('div');
            card.className = 'day-card';
            const isOpen = idx === 0;
            let rows = log.items.map((item, i) => `
                <tr class="item-row">
                    <td class="item-name">${item.name}</td>
                    <td class="item-input-cell">
                        <input type="text" class="item-input" value="${item.value}" onchange="updateVal(${log.id}, ${i}, this.value)">
                    </td>
                </tr>
            `).join('');

            card.innerHTML = `
                <div class="day-header" onclick="this.nextElementSibling.classList.toggle('active')">
                    <span class="day-title">📅 ${log.date} のログ</span>
                    <span style="font-size:0.8rem; color:#ced4da;">${isOpen ? '▲' : '▼'}</span>
                </div>
                <div class="day-content ${isOpen ? 'active' : ''}">
                    <table class="item-table">${rows}</table>
                    <div class="card-footer">
                        <button id="btn-del-pre-${log.id}" class="btn-small" style="background:#f1f2f6; color:#a4b0be;" onclick="showDelConfirm(${log.id})">削除</button>
                        <div id="confirm-ui-${log.id}" style="display:none; gap:5px; align-items:center;">
                            <span style="font-size:0.75rem; color:var(--danger-red); font-weight:bold;">消す？</span>
                            <button class="btn-small" style="background:var(--danger-red);" onclick="deleteDay(${log.id})">OK</button>
                            <button class="btn-small" style="background:#ccc;" onclick="hideDelConfirm(${log.id})">戻る</button>
                        </div>
                    </div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js').catch(() => {}); }
    render();
</script>
</body>
</html>
