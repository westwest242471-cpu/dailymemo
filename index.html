<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Item Memo PoP-Slim</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { 
            --bg-color: #f0f9ff;
            --main-blue: #007aff;
            --accent-orange: #ff4d4f;
            --success-green: #52c41a;
            --text-color: #333;
            --card-bg: #ffffff;
        }

        body { 
            font-family: sans-serif;
            background-color: var(--bg-color); 
            margin: 0; 
            padding: calc(env(safe-area-inset-top) + 5px) 8px 20px; 
            color: var(--text-color);
            font-size: 14px; 
        }

        .container { max-width: 500px; margin: 0 auto; }
        
        button { cursor: pointer; border: none; border-radius: 12px; font-weight: bold; transition: 0.2s; }

        #installBanner { display: none; background: #333; color: white; padding: 8px 12px; margin-bottom: 8px; border-radius: 10px; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .install-btn { background: var(--success-green); color: white; padding: 4px 10px; font-size: 0.75rem; }

        .add-btn { background-color: var(--main-blue); color: white; width: 100%; padding: 10px; font-size: 1rem; margin-bottom: 10px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }

        .day-card { border-radius: 12px; background: var(--card-bg); margin-bottom: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e1f0ff; }
        .day-header { background: #fff; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .day-title { font-size: 0.95rem; font-weight: bold; color: var(--main-blue); }
        .day-content { display: none; border-top: 1px solid #f0f0f0; padding-bottom: 4px; }
        .day-content.active { display: block; }

        .item-table { width: 100%; border-collapse: collapse; }
        .item-row { border-bottom: 1px solid #f9f9f9; }
        .item-name { width: 40%; padding: 6px 10px; font-size: 0.85rem; color: #666; background: #fafafa; }
        .item-input-cell { width: 60%; padding: 4px 8px; }
        /* 入力欄の微調整 */
        .item-input { width: 100%; padding: 8px; border: 1.5px solid #eee; border-radius: 8px; font-size: 1.1rem; outline: none; box-sizing: border-box; background: #fff; color: #000; -webkit-appearance: none; }
        .item-input:focus { border-color: var(--main-blue); background: #fdfdf0; }

        .card-footer { display: flex; justify-content: flex-end; padding: 6px 10px; background: #fafafa; gap: 8px; }
        .btn-small { font-size: 0.75rem; padding: 4px 12px; color: white; border-radius: 8px; }

        .master-settings { margin-top: 20px; }
        .master-header { background: #e1f0ff; padding: 8px 12px; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: #555; font-size: 0.85rem; font-weight: bold; }
        .master-content { display: none; padding: 10px 0; }
        .master-content.active { display: block; }
        
        .master-row { display: flex; align-items: center; background: #fff; border: 1px solid #eee; margin-bottom: 4px; padding: 4px 8px; border-radius: 8px; }
        .master-name-text { flex-grow: 1; font-weight: bold; padding-left: 8px; font-size: 0.85rem; }
        .btn-order { background: #f0f0f0; color: #333; padding: 4px 8px; font-size: 0.75rem; border-radius: 6px; margin: 0 1px; }

        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: flex-start; padding-top: 40px; }
        .modal { background: white; width: 85%; max-width: 320px; padding: 15px; border-radius: 15px; animation: slideDown 0.2s ease-out; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal h3 { margin: 0 0 10px; font-size: 1rem; color: var(--main-blue); }
        .modal input { width: 100%; padding: 10px; border: 2px solid #eee; border-radius: 8px; font-size: 1rem; box-sizing: border-box; margin-bottom: 15px; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="installBanner"><span>アプリとして保存</span><button class="install-btn" id="installBtn">追加</button></div>
    <button class="add-btn" onclick="addNewDay()">＋ 新規メモを追加</button>
    <div id="memoList"></div>

    <div class="master-settings">
        <div class="master-header" onclick="toggleMaster()">
            <span>⚙️ 項目マスター設定 (開閉)</span>
            <span id="masterArrow">▼</span>
        </div>
        <div id="masterContent" class="master-content">
            <div id="masterItemList"></div>
            <div id="masterConfirmArea"></div>
            <button onclick="openModal()" style="background:var(--success-green); color:white; width:100%; padding:10px; margin-top:8px;">＋ 項目を追加</button>
        </div>
    </div>
</div>

<div id="modalOverlay"><div class="modal"><h3>項目を追加</h3><input type="text" id="newMasterItemName" placeholder="項目名..."><div style="display:flex; gap:8px; justify-content:flex-end;"><button class="btn-small" style="background:#ccc;" onclick="closeModal()">中止</button><button class="btn-small" style="background:var(--main-blue);" onclick="executeAddMaster()">追加</button></div></div></div>

<script>
    let store = JSON.parse(localStorage.getItem('daily_memo_v8')) || { master_items: ["生産数", "ロス数", "清掃点検"], logs: [] };
    function save() { localStorage.setItem('daily_memo_v8', JSON.stringify(store)); render(); }
    function getTargetDate() { const now = new Date(); if (now.getHours() >= 18) now.setDate(now.getDate() + 1); return `${now.getMonth() + 1}/${now.getDate()}`; }
    function addNewDay() { const dateStr = getTargetDate(); const newEntry = { id: Date.now(), date: dateStr, items: store.master_items.map(name => ({ name: name, value: "" })) }; store.logs.unshift(newEntry); if (store.logs.length > 30) store.logs.pop(); save(); }
    function updateVal(dayId, itemIdx, val) { const log = store.logs.find(l => l.id === dayId); if (log) { log.items[itemIdx].value = val; localStorage.setItem('daily_memo_v8', JSON.stringify(store)); } }
    
    function toggleMaster() {
        const content = document.getElementById('masterContent');
        const arrow = document.getElementById('masterArrow');
        content.classList.toggle('active');
        arrow.innerText = content.classList.contains('active') ? '▲' : '▼';
    }

    function openModal() { document.getElementById('modalOverlay').style.display = 'flex'; const input = document.getElementById('newMasterItemName'); input.focus(); input.onkeydown = (e) => { if (e.key === 'Enter') executeAddMaster(); }; }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; document.getElementById('newMasterItemName').value = ''; }
    function executeAddMaster() { const name = document.getElementById('newMasterItemName').value.trim(); if (name) { store.master_items.push(name); save(); closeModal(); } }
    
    function showDelConfirm(dayId) { document.getElementById(`btn-del-pre-${dayId}`).style.display = 'none'; document.getElementById(`confirm-ui-${dayId}`).style.display = 'flex'; }
    function hideDelConfirm(dayId) { document.getElementById(`btn-del-pre-${dayId}`).style.display = 'inline-block'; document.getElementById(`confirm-ui-${dayId}`).style.display = 'none'; }
    function deleteDay(dayId) { store.logs = store.logs.filter(l => l.id !== dayId); save(); }
    function moveItem(idx, direction) { const newIdx = idx + direction; if (newIdx < 0 || newIdx >= store.master_items.length) return; const temp = store.master_items[idx]; store.master_items[idx] = store.master_items[newIdx]; store.master_items[newIdx] = temp; save(); }
    function showMasterDelConfirm(idx) { const name = store.master_items[idx]; document.getElementById('masterConfirmArea').innerHTML = `<div style="background:#fff1f0; border:1px solid #ffa39e; padding:6px; border-radius:8px; margin-top:5px; display:flex; justify-content:space-between; align-items:center; font-size:0.8rem;"><span>「${name}」を削除？</span><div><button class="btn-small" style="background:var(--accent-orange);" onclick="executeMasterDelete(${idx})">削除</button><button class="btn-small" style="background:#ccc;" onclick="document.getElementById('masterConfirmArea').innerHTML=''">中止</button></div></div>`; }
    function executeMasterDelete(idx) { store.master_items.splice(idx, 1); document.getElementById('masterConfirmArea').innerHTML = ''; save(); }

    function render() {
        const mList = document.getElementById('masterItemList');
        mList.innerHTML = store.master_items.map((it, i) => `
            <div class="master-row">
                <button class="btn-order" onclick="moveItem(${i}, -1)" ${i === 0 ? 'disabled style="opacity:0.2"' : ''}>↑</button>
                <button class="btn-order" onclick="moveItem(${i}, 1)" ${i === store.master_items.length - 1 ? 'disabled style="opacity:0.2"' : ''}>↓</button>
                <div class="master-name-text">${it}</div>
                <span style="color:var(--accent-orange); padding:4px 8px; font-weight:bold;" onclick="showMasterDelConfirm(${i})">×</span>
            </div>
        `).join('');

        const list = document.getElementById('memoList');
        list.innerHTML = '';
        store.logs.forEach((log, idx) => {
            const card = document.createElement('div');
            card.className = 'day-card';
            const isOpen = idx === 0;
            // ★ type="text" に戻し、inputmode="decimal" で数字キーボードを誘発
            let rows = log.items.map((item, i) => `<tr class="item-row"><td class="item-name">${item.name}</td><td class="item-input-cell"><input type="text" class="item-input" value="${item.value}" onchange="updateVal(${log.id}, ${i}, this.value)" inputmode="decimal"></td></tr>`).join('');
            card.innerHTML = `<div class="day-header" onclick="this.nextElementSibling.classList.toggle('active')"><span class="day-title">${log.date} の記録</span><span style="font-size:0.8rem; color:#ccc;">${isOpen ? '▲' : '▼'}</span></div><div class="day-content ${isOpen ? 'active' : ''}"><table class="item-table">${rows}</table><div class="card-footer"><button id="btn-del-pre-${log.id}" class="btn-small" style="background:#ddd; color:#888;" onclick="showDelConfirm(${log.id})">削除</button><div id="confirm-ui-${log.id}" style="display:none; gap:5px; align-items:center;"><span style="font-size:0.7rem; color:red;">OK?</span><button class="btn-small" style="background:var(--accent-orange);" onclick="deleteDay(${log.id})">はい</button><button class="btn-small" style="background:#ccc;" onclick="hideDelConfirm(${log.id})">中止</button></div></div></div>`;
            list.appendChild(card);
        });
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; if (!window.matchMedia('(display-mode: standalone)').matches) document.getElementById('installBanner').style.display = 'flex'; });
    document.getElementById('installBtn').addEventListener('click', async () => { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; document.getElementById('installBanner').style.display = 'none'; } });

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
    render();
</script>
</body>
</html>
