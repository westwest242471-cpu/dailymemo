<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Item Memo Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --main-blue: #0056b3; --danger: #e74c3c; --success: #27ae60; --gray: #95a5a6; }
        body { font-family: sans-serif; background-color: #f0f0f0; margin: 0; padding: env(safe-area-inset-top) 5px 20px; font-size: 14px; }
        .container { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; padding: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); position: relative; padding-bottom: 60px; }
        
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        
        #installBanner { display: none; background: #333; color: white; padding: 12px; margin-bottom: 10px; border-radius: 8px; justify-content: space-between; align-items: center; }
        .install-btn { background: var(--success); color: white; padding: 6px 15px; font-size: 0.85rem; }

        .add-btn { background-color: var(--main-blue); color: white; width: 100%; padding: 12px; font-size: 1rem; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .add-btn:active { transform: scale(0.98); }

        /* メモカード */
        .day-card { border: 1px solid #ddd; margin-bottom: 6px; border-radius: 6px; background: white; }
        .day-header { background: #fdfdfd; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid #eee; }
        .day-title { font-size: 0.95rem; font-weight: bold; color: #444; }
        .day-content { padding: 0; display: none; border-top: 1px solid #eee; }
        .day-content.active { display: block; }

        /* テーブルレイアウト */
        .item-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .item-row { border-bottom: 1px solid #f9f9f9; }
        .item-name { width: 38%; padding: 8px; font-size: 0.85rem; color: #555; background: #fafafa; border-right: 1px solid #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-input-cell { width: 62%; padding: 4px; }
        .item-input { width: 92%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; outline: none; box-sizing: border-box; }
        .item-input:focus { border-color: var(--main-blue); background: #fffdf0; }

        .card-footer { display: flex; justify-content: flex-end; padding: 6px; background: #fafafa; gap: 8px; }
        .btn-small { font-size: 0.75rem; padding: 5px 10px; color: white; border-radius: 4px; }

        /* 項目マスター管理エリア（アコーディオン） */
        .master-settings { border: 1px solid #ddd; border-radius: 8px; margin-top: 25px; overflow: hidden; }
        .master-header { background: #eee; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: bold; color: #666; font-size: 0.85rem; }
        .master-content { display: none; padding: 10px; background: #f8f9fa; }
        .master-content.active { display: block; }
        
        .master-list-ui { margin-bottom: 8px; }
        .master-row { display: flex; align-items: center; background: #fff; border: 1px solid #ddd; margin-bottom: 4px; padding: 6px; border-radius: 6px; }
        .master-name-text { flex-grow: 1; font-weight: bold; padding-left: 8px; }
        .order-btns { display: flex; gap: 4px; }
        .btn-order { background: #f0f0f0; color: #333; padding: 4px 8px; font-size: 0.8rem; border-radius: 4px; }
        
        /* フッター表示 */
        .app-footer { margin-top: 30px; text-align: center; color: #999; font-size: 0.7rem; line-height: 1.5; }

        /* モーダル */
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: flex-start; padding-top: 50px; }
        .modal { background: white; width: 90%; max-width: 350px; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); animation: slideDown 0.3s ease-out; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1.1rem; box-sizing: border-box; margin: 15px 0; outline: none; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="installBanner">
        <span style="font-size: 0.85rem;">ホーム画面に追加してアプリ化</span>
        <button class="install-btn" id="installBtn">追加する</button>
    </div>

    <button class="add-btn" onclick="addNewDay()">＋ 上部に新規メモを追加</button>
    
    <div id="memoList"></div>

    <div class="master-settings">
        <div class="master-header" onclick="toggleMaster()">
            <span>⚙️ 項目マスター設定 (編集・並び替え)</span>
            <span id="masterArrow">▼</span>
        </div>
        <div id="masterContent" class="master-content">
            <div id="masterItemList" class="master-list-ui"></div>
            <div id="masterConfirmArea"></div>
            <button onclick="openModal()" style="background:var(--success); color:white; width:100%; padding:10px; margin-top:5px; font-size:0.9rem;">＋ 項目を新規登録</button>
        </div>
    </div>

    <div class="app-footer">
        <div>制作者：1F加工西</div>
        <div>Version 1.8</div>
    </div>
</div>

<div id="modalOverlay">
    <div class="modal">
        <h3>新しい項目を追加</h3>
        <p style="font-size:0.8rem; color:#888;">（例：ロス数、清掃確認 など）</p>
        <input type="text" id="newMasterItemName" placeholder="項目名を入力...">
        <div class="modal-btns">
            <button class="btn-small" style="background:var(--gray);" onclick="closeModal()">キャンセル</button>
            <button class="btn-small" style="background:var(--main-blue);" onclick="executeAddMaster()">追加する</button>
        </div>
    </div>
</div>

<script>
    let deferredPrompt;
    const installBanner = document.getElementById('installBanner');
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if (!window.matchMedia('(display-mode: standalone)').matches) {
            installBanner.style.display = 'flex';
        }
    });

    installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') installBanner.style.display = 'none';
        deferredPrompt = null;
    });

    /* --- メインロジック --- */
    let store = JSON.parse(localStorage.getItem('daily_memo_v8')) || {
        master_items: ["生産数", "ロス数", "清掃点検"],
        logs: []
    };

    function save() {
        localStorage.setItem('daily_memo_v8', JSON.stringify(store));
        render();
    }

    function getTargetDate() {
        const now = new Date();
        if (now.getHours() >= 18) now.setDate(now.getDate() + 1);
        return `${now.getMonth() + 1}/${now.getDate()}`;
    }

    function addNewDay() {
        const dateStr = getTargetDate();
        const newEntry = {
            id: Date.now(),
            date: dateStr,
            items: store.master_items.map(name => ({ name: name, value: "" }))
        };
        store.logs.unshift(newEntry);
        if (store.logs.length > 30) store.logs.pop();
        save();
    }

    function updateVal(dayId, itemIdx, val) {
        const log = store.logs.find(l => l.id === dayId);
        if (log) {
            log.items[itemIdx].value = val;
            localStorage.setItem('daily_memo_v8', JSON.stringify(store));
        }
    }

    function toggleMaster() {
        const content = document.getElementById('masterContent');
        const arrow = document.getElementById('masterArrow');
        const isActive = content.classList.toggle('active');
        arrow.innerText = isActive ? '▲' : '▼';
    }

    function openModal() {
        document.getElementById('modalOverlay').style.display = 'flex';
        const input = document.getElementById('newMasterItemName');
        input.focus();
        input.onkeydown = function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                executeAddMaster();
            }
        };
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        document.getElementById('newMasterItemName').value = '';
    }

    function executeAddMaster() {
        const nameInput = document.getElementById('newMasterItemName');
        const name = nameInput.value.trim();
        if (name) {
            store.master_items.push(name);
            save();
            closeModal();
        }
    }

    function showDelConfirm(dayId) {
        document.getElementById(`btn-del-pre-${dayId}`).style.display = 'none';
        document.getElementById(`confirm-ui-${dayId}`).style.display = 'flex';
    }
    function hideDelConfirm(dayId) {
        document.getElementById(`btn-del-pre-${dayId}`).style.display = 'inline-block';
        document.getElementById(`confirm-ui-${dayId}`).style.display = 'none';
    }
    function deleteDay(dayId) {
        store.logs = store.logs.filter(l => l.id !== dayId);
        save();
    }
    function moveItem(idx, direction) {
        const newIdx = idx + direction;
        if (newIdx < 0 || newIdx >= store.master_items.length) return;
        const temp = store.master_items[idx];
        store.master_items[idx] = store.master_items[newIdx];
        store.master_items[newIdx] = temp;
        save();
    }
    function showMasterDelConfirm(idx) {
        const name = store.master_items[idx];
        document.getElementById('masterConfirmArea').innerHTML = `
            <div style="background:#fff1f0; border:1px solid #ffa39e; padding:6px; border-radius:6px; margin-top:5px; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:0.8rem;">「${name}」を削除？</span>
                <div>
                    <button class="btn-small" style="background:var(--danger);" onclick="executeMasterDelete(${idx})">はい</button>
                    <button class="btn-small" style="background:var(--gray);" onclick="document.getElementById('masterConfirmArea').innerHTML=''">×</button>
                </div>
            </div>
        `;
    }
    function executeMasterDelete(idx) {
        store.master_items.splice(idx, 1);
        document.getElementById('masterConfirmArea').innerHTML = '';
        save();
    }

    function render() {
        const mList = document.getElementById('masterItemList');
        mList.innerHTML = store.master_items.map((it, i) => `
            <div class="master-row">
                <div class="order-btns">
                    <button class="btn-order" onclick="moveItem(${i}, -1)" ${i === 0 ? 'disabled style="opacity:0.3"' : ''}>↑</button>
                    <button class="btn-order" onclick="moveItem(${i}, 1)" ${i === store.master_items.length - 1 ? 'disabled style="opacity:0.3"' : ''}>↓</button>
                </div>
                <div class="master-name-text">${it}</div>
                <span style="color:var(--danger); cursor:pointer; font-weight:bold; padding:4px 10px;" onclick="showMasterDelConfirm(${i})">×</span>
            </div>
        `).join('');

        const list = document.getElementById('memoList');
        list.innerHTML = '';
        store.logs.forEach((log, idx) => {
            const card = document.createElement('div');
            card.className = 'day-card';
            const isOpen = idx === 0;
            let rows = log.items.map((item, i) => `
                <tr class="item-row">
                    <td class="item-name">${item.name}</td>
                    <td class="item-input-cell">
                        <input type="text" class="item-input" value="${item.value}" onchange="updateVal(${log.id}, ${i}, this.value)">
                    </td>
                </tr>
            `).join('');

            card.innerHTML = `
                <div class="day-header" onclick="this.nextElementSibling.classList.toggle('active')">
                    <span class="day-title">${log.date} の記録</span>
                    <span style="font-size:0.75rem; color:#999;">${isOpen ? '▲' : '▼'}</span>
                </div>
                <div class="day-content ${isOpen ? 'active' : ''}">
                    <table class="item-table">${rows}</table>
                    <div class="card-footer">
                        <button id="btn-del-pre-${log.id}" class="btn-small" style="background:var(--gray);" onclick="showDelConfirm(${log.id})">削除</button>
                        <div id="confirm-ui-${log.id}" style="display:none; gap:5px; align-items:center;">
                            <span style="font-size:0.75rem; color:red;">削除？</span>
                            <button class="btn-small" style="background:var(--danger);" onclick="deleteDay(${log.id})">はい</button>
                            <button class="btn-small" style="background:var(--gray);" onclick="hideDelConfirm(${log.id})">中止</button>
                        </div>
                    </div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
    render();
</script>
</body>
</html>
